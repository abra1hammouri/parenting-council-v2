<html lang="ar" dir="rtl">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>مجلس التربية الممتد</title>
    <script>
        // Redirect all 404s to the index.html with the path
        var path = window.location.pathname;
        if (path !== '/' && !path.includes('.')) {
            window.location.href = '/parenting-council-v2/?redirect=' + encodeURIComponent(path);
        }
    </script>
</head>
